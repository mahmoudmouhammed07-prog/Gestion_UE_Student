<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gestion des Unités d'Enseignement</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <style>
        :root {
            --primary: #2c7be5;
            --primary-dark: #1e5bb8;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --radius: 10px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(to bottom, var(--gray-100), #e2e8f0);
            margin: 0;
            padding: 20px 15px;
            color: #222;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        h1, h2 {
            color: #1a202c;
            margin-bottom: 1.2rem;
        }

        .card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 1.8rem 2rem;
            margin-bottom: 2.5rem;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem 1.8rem;
        }

        .form-grid.full-width { grid-template-columns: 1fr; }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 0.45rem;
            color: #4a5568;
            font-size: 0.95rem;
        }

        input, select {
            padding: 0.75rem 0.9rem;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44,123,229,0.15);
        }

        .btn {
            padding: 0.85rem 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .btn-loading::after {
            content: "";
            width: 16px; height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            margin-top: 1.5rem;
        }

        th, td { padding: 14px 12px; text-align: center; }

        th {
            background: var(--primary);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.4px;
        }

        tr:nth-child(even) { background: #f9fafb; }
        tr:hover { background: #edf2ff; }

        .error-message {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 0.8rem;
            display: none;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .card { padding: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">

    <h1><i class="fas fa-graduation-cap"></i> Gestion des Unités d'Enseignement</h1>

    <div class="card">
        <h2>Ajouter une UE</h2>

        <div class="form-grid">
            <div class="form-group">
                <label for="code">Code UE</label>
                <input type="text" id="code" placeholder="ex: UE-M1-INFO-01" required>
            </div>

            <div class="form-group">
                <label for="domaine">Domaine</label>
                <input type="text" id="domaine" placeholder="ex: Technologies de l'Information" required>
            </div>

            <div class="form-group">
                <label for="responsable">Responsable</label>
                <input type="text" id="responsable" placeholder="Dr. Mohamed Ali" required>
            </div>

            <div class="form-group">
                <label for="credits">Crédits (ECTS)</label>
                <input type="number" id="credits" min="1" max="30" placeholder="6" required>
            </div>

            <div class="form-group full-width">
                <label for="semestre">Semestre</label>
                <select id="semestre" required>
                    <option value="">— Sélectionner —</option>
                    <option value="S1">Semestre 1</option>
                    <option value="S2">Semestre 2</option>
                    <option value="S3">Semestre 3</option>
                    <option value="S4">Semestre 4</option>
                    <option value="S5">Semestre 5</option>
                    <option value="S6">Semestre 6</option>
                </select>
            </div>
        </div>

        <button class="btn btn-primary" id="btnAddUE">
            <i class="fas fa-plus"></i> Ajouter UE
        </button>

        <div class="error-message" id="ueError"></div>
    </div>

    <div class="card">
        <h2>Liste des Unités d'Enseignement</h2>
        <table id="ueTable">
            <thead>
            <tr>
                <th>Code</th>
                <th>Domaine</th>
                <th>Responsable</th>
                <th>Crédits</th>
                <th>Semestre</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>
    const API_BASE = "http://localhost:8080/Gestion_UE_Student/rest";

    async function fetchXML(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Erreur ${res.status}`);
        const text = await res.text();
        return new DOMParser().parseFromString(text, "application/xml");
    }

    function showError(id, msg) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.style.display = msg ? "block" : "none";
    }

    function setLoading(btn, loading) {
        btn.disabled = loading;
        btn.classList.toggle("btn-loading", loading);
    }

    async function loadUEs() {
        try {
            const xml = await fetchXML(`${API_BASE}/UE/all`);
            const unites = xml.getElementsByTagName("uniteEnseignement");
            const tbody = document.querySelector("#ueTable tbody");
            tbody.innerHTML = "";

            Array.from(unites).forEach(ue => {
                const row = document.createElement("tr");
                row.innerHTML = `
                <td>${ue.getElementsByTagName("code")[0]?.textContent || "-"}</td>
                <td>${ue.getElementsByTagName("domaine")[0]?.textContent || "-"}</td>
                <td>${ue.getElementsByTagName("responsable")[0]?.textContent || "-"}</td>
                <td>${ue.getElementsByTagName("credits")[0]?.textContent || "-"}</td>
                <td>${ue.getElementsByTagName("semestre")[0]?.textContent || "-"}</td>
            `;
                tbody.appendChild(row);
            });
        } catch (err) {
            console.error(err);
        }
    }

    async function addUE() {
        const btn = document.getElementById("btnAddUE");
        setLoading(btn, true);
        showError("ueError", "");

        try {
            const fields = {
                code:        document.getElementById("code").value.trim(),
                domaine:     document.getElementById("domaine").value.trim(),
                responsable: document.getElementById("responsable").value.trim(),
                credits:     document.getElementById("credits").value,
                semestre:    document.getElementById("semestre").value
            };

            if (Object.values(fields).some(v => !v)) {
                throw new Error("Veuillez remplir tous les champs");
            }

            const xml = `
            <uniteEnseignement>
                <code>${fields.code}</code>
                <domaine>${fields.domaine}</domaine>
                <responsable>${fields.responsable}</responsable>
                <credits>${fields.credits}</credits>
                <semestre>${fields.semestre}</semestre>
            </uniteEnseignement>`;

            const res = await fetch(`${API_BASE}/UE/create`, {
                method: "POST",
                headers: { "Content-Type": "application/xml" },
                body: xml
            });

            if (!res.ok) throw new Error("Échec de l'ajout (vérifiez le serveur)");

            // Reset + refresh
            document.getElementById("code").value = "";
            document.getElementById("domaine").value = "";
            document.getElementById("responsable").value = "";
            document.getElementById("credits").value = "";
            document.getElementById("semestre").value = "";

            await loadUEs();
        } catch (err) {
            showError("ueError", err.message);
        } finally {
            setLoading(btn, false);
        }
    }

    document.getElementById("btnAddUE").onclick = addUE;
    window.addEventListener("load", loadUEs);
</script>
</body>
</html>
